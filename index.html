<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading & Memory Study — CCL, Krea University</title>

  <!-- jsPsych core + plugins (v7.3.4) -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
  <!-- DataPipe: routes data to your OSF component (no backend needed) -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />

  <style>
    :root {
      --ink: #1c1c1e;
      --muted: #6b6b70;
      --bg: #f4f2ec;          /* warm, low-glare paper tone */
      --card: #fbfaf6;
      --line: #ddd8cc;
      --accent: #355c4e;      /* muted forest green */
      --accent-ink: #ffffff;
      --key-bg: #e9e5da;
      --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
      --sans: "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
    }

    /* the experiment renders inside this centered target */
    #jspsych-target {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      box-sizing: border-box;
    }

    .jspsych-content { max-width: 700px; }

    /* ---- story reading ---- */
    .story-box { padding: 8px 0; }
    .story-sentence {
      font-family: var(--serif);
      font-size: 1.7rem;
      line-height: 1.5;
      color: var(--ink);
      max-width: 28em;
      margin: 0 auto;
    }
    .advance-hint {
      margin-top: 2.4rem;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: lowercase;
    }
    .key {
      display: inline-block;
      background: var(--key-bg);
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 8px;
      font-family: var(--sans);
      font-size: 0.8rem;
      color: var(--ink);
    }
    .fixation { font-size: 2.6rem; color: var(--muted); }
    .blank { height: 2rem; }

    /* ---- text / instruction pages ---- */
    .textpage {
      text-align: left;
      font-size: 1.06rem;
      line-height: 1.65;
      color: var(--ink);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 34px 40px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }
    .textpage h1 { font-family: var(--serif); font-size: 1.8rem; margin: 0 0 0.6rem; }
    .textpage h2 { font-family: var(--serif); font-size: 1.45rem; margin: 0 0 0.6rem; }
    .textpage h3 { font-size: 1.0rem; margin: 1.2rem 0 0.3rem; color: var(--accent); letter-spacing: 0.02em; }
    .textpage p  { margin: 0.55rem 0; }
    .textpage .advance-hint { text-align: center; margin-top: 1.8rem; }

    .consent { max-height: 72vh; overflow-y: auto; }

    /* ---- questions ---- */
    .question {
      font-family: var(--serif);
      font-size: 1.35rem;
      line-height: 1.5;
      margin-bottom: 1.6rem;
    }

    /* ---- buttons ---- */
    .jspsych-btn {
      font-family: var(--sans);
      font-size: 1rem;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--ink);
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .jspsych-btn:hover { border-color: var(--accent); background: #fff; }

    .order-option {
      display: block;
      width: 100%;
      max-width: 30em;
      margin: 8px auto;
      font-family: var(--serif);
      font-size: 1.12rem;
      line-height: 1.4;
      text-align: left;
      padding: 16px 20px;
    }
    .conf-option { min-width: 92px; margin: 6px; }
    .consent-btn { min-width: 150px; margin: 8px 10px; }
    .jspsych-btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
    .jspsych-btn.primary:hover { filter: brightness(1.08); }
    .jspsych-btn.ghost { background: transparent; }

    /* ---- forms ---- */
    .form-block { margin: 16px 0; text-align: left; }
    .form-block label { font-size: 1.0rem; }
    .form-block label.inline { display: inline-block; margin-right: 18px; font-weight: normal; }
    .form-block textarea, .form-block input[type="number"], .form-block select {
      font-family: var(--sans); font-size: 1rem;
      border: 1px solid var(--line); border-radius: 8px; padding: 8px; margin-top: 6px;
      background: #fff;
    }

    /* ---- completion / download screen ---- */
    .done { text-align: center; }
    .done h1 { text-align: center; }
    .subjcode { color: var(--muted); font-size: 0.9rem; }
    .dl-buttons { margin: 22px 0 8px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .summary-preview { text-align: left; margin-top: 18px; border-top: 1px solid var(--line); padding-top: 16px; }
    .summary-preview .note { color: var(--muted); font-size: 0.85rem; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; font-family: var(--sans); }
    .summary-table td { padding: 5px 8px; border-bottom: 1px solid #efece3; }
    .summary-table tr td:first-child { color: var(--muted); }

    @media (max-width: 600px) {
      .story-sentence { font-size: 1.4rem; }
      .textpage { padding: 24px 22px; }
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <!-- materials first, then the engine -->
  <script src="stimuli.js"></script>
  <script src="experiment.js"></script>
</body>
</html>
